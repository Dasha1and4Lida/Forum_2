<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Чат с {{ other[1] }}</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #007bff; color: white; padding: 15px; position: fixed; top: 0; left: 0; right: 0; text-align: center; }
        .header a { color: white; text-decoration: none; float: left; }
        .messages { flex: 1; overflow-y: auto; padding: 70px 15px 80px; }
        .msg { margin-bottom: 15px; display: flex; }
        .mine { justify-content: flex-end; }
        .other { justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 10px; border-radius: 15px; }
        .mine .bubble { background: #007bff; color: white; border-bottom-right-radius: 3px; }
        .other .bubble { background: white; color: #333; border-bottom-left-radius: 3px; }
        .time { font-size: 10px; color: #999; margin-top: 3px; display: block; }
        .input-area { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .input-area textarea { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; resize: none; font-family: Arial; }
        .input-area button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
    <script>
        function scrollBottom() {
            var el = document.getElementById('msg-container');
            el.scrollTop = el.scrollHeight;
        }
        window.onload = scrollBottom;
    </script>
</head>
<body>
    <div class="header">
        <a href="/chat">←</a>
        Чат с {{ other[1] }}
    </div>

    <div id="msg-container" class="messages">
        {% for msg in messages %}
        <div class="msg {% if msg[1] == session.user_id %}mine{% else %}other{% endif %}">
            <div class="bubble">
                {{ msg[3] }}
                <span class="time">{{ msg[6] }}</span>
            </div>
        </div>
        {% endfor %}
    </div>

    <form method="POST" action="/send_message/{{ other[0] }}" class="input-area">
        <textarea name="content" rows="1" placeholder="Сообщение..." required></textarea>
        <button type="submit">➤</button>
    </form>
</body>
</html>
