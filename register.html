<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Регистрация</h1>
    {% with messages = get_flashed_messages() %}
        {% for message in messages %}
            <div style="background: #d4edda; padding: 10px;">{{ message }}</div>
        {% endfor %}
    {% endwith %}
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="full_name" placeholder="Ваше имя" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Зарегистрироваться</button>
    </form>
    <p><a href="/login">Уже есть аккаунт? Войти</a></p>
</div>
</body>
</html>
